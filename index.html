<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEO Asteroid Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen transition-colors duration-300">

  <!-- Navbar -->
  <nav class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-xl">🚀</span>
        <span class="font-semibold text-gray-900 dark:text-white text-lg">NEO Tracker</span>
      </div>
      <button id="themeToggle"
        class="text-sm px-3 py-1.5 rounded-lg border border-gray-200 dark:border-gray-700
               text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800
               transition-colors">
        🌙 Dark
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <header class="max-w-6xl mx-auto px-4 py-10 text-center">
    <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 dark:text-white mb-3">
      Asteroids passing Earth this week
    </h1>
    <p class="text-gray-500 dark:text-gray-400 text-base sm:text-lg max-w-xl mx-auto">
      Live data from NASA's Near Earth Object Web Service.
      Updated every time you load the page.
    </p>

    <!-- Date picker -->
    <div class="mt-6 flex flex-col sm:flex-row items-center justify-center gap-3">
      <label class="text-sm text-gray-500 dark:text-gray-400">Pick a start date:</label>
      <input type="date" id="datePicker"
        class="text-sm px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-700
               bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-200
               focus:outline-none focus:ring-2 focus:ring-blue-500" />
      <button id="fetchBtn"
        class="text-sm px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700
               text-white font-medium transition-colors">
        Fetch Asteroids
      </button>
    </div>
  </header>

  <!-- Stats bar -->
  <div id="statsBar" class="hidden max-w-6xl mx-auto px-4 mb-6">
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-3">
      <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-4">
        <p class="text-xs text-gray-400 mb-1">Total asteroids</p>
        <p id="statTotal" class="text-2xl font-semibold text-gray-900 dark:text-white">—</p>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-4">
        <p class="text-xs text-gray-400 mb-1">Potentially hazardous</p>
        <p id="statHazardous" class="text-2xl font-semibold text-red-500">—</p>
      </div>
      <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-800 p-4 col-span-2 sm:col-span-1">
        <p class="text-xs text-gray-400 mb-1">Closest approach</p>
        <p id="statClosest" class="text-2xl font-semibold text-blue-500">—</p>
      </div>
    </div>
  </div>

  <!-- Error message -->
  <div id="error"
    class="hidden max-w-6xl mx-auto px-4 mb-6">
    <div class="bg-red-50 dark:bg-red-950 border border-red-200 dark:border-red-800
                text-red-700 dark:text-red-400 rounded-xl px-5 py-4 text-sm">
      <span id="errorText"></span>
    </div>
  </div>

  <!-- Loader -->
  <div id="loader" class="hidden flex flex-col items-center justify-center py-20 gap-4">
    <div class="spinner"></div>
    <p class="text-gray-400 dark:text-gray-500 text-sm">Fetching asteroid data from NASA...</p>
  </div>

  <!-- Cards grid -->
  <main id="cardsGrid"
    class="max-w-6xl mx-auto px-4 pb-16
           grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
  </main>

  <!-- Empty state -->
  <div id="emptyState" class="hidden flex flex-col items-center justify-center py-24 text-center px-4">
    <span class="text-5xl mb-4">🌌</span>
    <p class="text-gray-500 dark:text-gray-400 text-lg font-medium">No asteroids found</p>
    <p class="text-gray-400 dark:text-gray-500 text-sm mt-1">Try a different date range</p>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
